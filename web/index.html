<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Order service</title>
<style>
  :root {
    --accent1: #FFB23E; --accent2: #FB8500; --accentText: #B5650A;
    --ink: #16273C; --body: #46566B; --muted: #8C97A8;
    --canvas: #F6F7FB; --card: #ffffff; --line: #E7EAF0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--canvas); color: var(--body);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; }
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .tile { width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2)); }
  h1 { font-size: 22px; color: var(--ink); margin: 0; }
  .sub { color: var(--muted); font-size: 13px; margin: 2px 0 0; }
  .pipe { display: inline-block; margin-top: 10px; padding: 5px 10px;
    background: #FFF3E2; color: var(--accentText); border-radius: 999px;
    font: 12px/1 ui-monospace, Menlo, monospace; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 20px; }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 18px; box-shadow: 0 1px 2px rgba(16,39,60,.04); }
  .panelhead { display: flex; justify-content: space-between; align-items: center; }
  .panelhead h2 { font-size: 16px; color: var(--ink); margin: 0; }
  .route { font: 12px/1 ui-monospace, Menlo, monospace; color: var(--muted); }
  label { display: block; font-size: 13px; color: var(--ink); margin: 12px 0 4px; }
  input, select { width: 100%; padding: 10px; border: 1px solid var(--line);
    border-radius: 10px; font-size: 14px; }
  button { cursor: pointer; border: 0; border-radius: 10px; color: #fff;
    font-size: 14px; font-weight: 600; padding: 11px; }
  .place { width: 100%; margin-top: 16px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2)); }
  .refresh { background: var(--ink); padding: 7px 12px; }
  .toast { margin-top: 12px; padding: 10px; border-radius: 10px;
    background: #E9F8EF; color: #1B7F47; font-size: 13px; display: none; }
  .err { margin-top: 12px; color: #B23B3B; font-size: 13px; }
  .order { display: flex; gap: 12px; align-items: center; padding: 12px 0;
    border-top: 1px solid var(--line); }
  .order:first-child { border-top: 0; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; flex: none;
    background: #FFF3E2; color: var(--accentText); display: flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
  .order .main { flex: 1; }
  .order .title { color: var(--ink); font-weight: 600; font-size: 14px; }
  .order .meta { color: var(--muted); font: 12px/1.4 ui-monospace, Menlo, monospace; }
  .pill { font-size: 12px; color: var(--accentText); background: #FFF3E2;
    padding: 3px 8px; border-radius: 999px; }
  footer { margin-top: 22px; color: var(--muted);
    font: 12px ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="tile"></div>
      <div>
        <h1>Order service</h1>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <div class="panelhead"><h2>Place an order</h2><span class="route">POST /orders</span></div>
        <label for="customer">Customer</label>
        <input id="customer" type="text" placeholder="e.g. Asha" />
        <label for="item">Item</label>
        <select id="item">
          <option>Margherita pizza</option>
          <option>Cold coffee</option>
          <option>Paneer wrap</option>
        </select>
        <label for="quantity">Quantity</label>
        <input id="quantity" type="number" min="1" value="1" />
        <button class="place" id="placeBtn">Place order</button>
        <div class="toast" id="toast"></div>
        <div class="err" id="err"></div>
      </section>

      <section class="card">
        <div class="panelhead"><h2>Orders</h2>
          <span><span class="route">GET /orders</span>
            <button class="refresh" id="refreshBtn">Refresh</button></span>
        </div>
        <div id="list"></div>
      </section>
    </div>
  </div>

<script src="config.js"></script>
<script>
  // Cross-origin: the page is on S3 (http) and the API is on execute-api (https),
  // so we call the API's absolute URL. config.js is generated at deploy time and
  // sets window.API_BASE to the real endpoint; the fallback keeps local edits working.
  const API_BASE = window.API_BASE || "";

  const $ = (id) => document.getElementById(id);

  function initials(name) {
    return (name || "?").trim().slice(0, 2).toUpperCase();
  }

  async function loadOrders() {
    $("err").textContent = "";
    try {
      const res = await fetch(API_BASE + "/orders");
      const orders = await res.json();
      const list = $("list");
      list.innerHTML = "";
      orders.forEach((o) => {
        const row = document.createElement("div");
        row.className = "order";
        row.innerHTML =
          '<div class="avatar">' + initials(o.customer) + "</div>" +
          '<div class="main">' +
            '<div class="title">' + o.item + " ×" + o.quantity + "</div>" +
            '<div class="meta">#' + String(o.orderId).slice(0, 8) + " · " + (o.customer || "") + "</div>" +
          "</div>" +
          '<span class="pill">' + (o.status || "New") + "</span>";
        list.appendChild(row);
      });
    } catch (e) {
      $("err").textContent = "Could not load orders: " + e.message;
    }
  }

  async function placeOrder() {
    $("err").textContent = "";
    const body = {
      customer: $("customer").value,
      item: $("item").value,
      quantity: Number($("quantity").value),
    };
    try {
      const res = await fetch(API_BASE + "/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const created = await res.json();
      if (res.status === 201) {
        const t = $("toast");
        t.textContent = "Order #" + String(created.orderId).slice(0, 8) + " created · 201";
        t.style.display = "block";
        setTimeout(() => (t.style.display = "none"), 2500);
        await loadOrders(); // re-fetch so the new order appears — the payoff
      } else {
        $("err").textContent = "Error: " + (created.message || res.status);
      }
    } catch (e) {
      $("err").textContent = "Request failed: " + e.message;
    }
  }

  $("placeBtn").addEventListener("click", placeOrder);
  $("refreshBtn").addEventListener("click", loadOrders);
  loadOrders();
</script>
</body>
</html>
